  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem 2.0rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.1rem;
      display: flex;
      align-items: center;
      gap: 0.45em;
    }

    .site-logo {
      height: 1.4em;
      width: auto;
    }

    .site-header p {
      font-size: 0.85rem;
      color: #888;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      display: grid;
      grid-template-columns: 360px 1fr;
      grid-template-rows: auto 1fr;
      gap: 1rem;
      align-items: start;
    }

    .site-header {
      grid-column: 1 / -1;
    }

    .container.layout-stacked {
      grid-template-columns: 1fr;
    }

    .container.layout-stacked .right-panel {
      order: 1;
    }

    .container.layout-stacked .options {
      order: 2;
    }

    .container.layout-stacked .cap-choices {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.3rem 1rem;
    }

    @media (max-width: 640px) {
      .container {
        grid-template-columns: 1fr;
      }

      .site-header {
        grid-column: 1;
      }

      .right-panel {
        order: 1;
      }

      .options {
        order: 2;
      }
    }

    .layout-footer {
      padding-top: 0.6rem;
      margin-top: 0.25rem;
      border-top: 1px solid #f0f0f0;
    }

    #layoutToggleBtn {
      color: #bbb;
      font-size: 0.78rem;
      font-weight: 400;
    }

    #layoutToggleBtn:hover {
      color: #2563eb;
      text-decoration: none;
    }

    .options {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 0.75rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem 0;
    }

    .option-group + .option-group {
      border-top: 1px solid #f0f0f0;
    }

    .option-group h2 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 0.1rem;
    }

    label {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1.4;
      user-select: none;
    }

    label input[type="checkbox"],
    label input[type="radio"] {
      width: 1rem;
      height: 1rem;
      margin-top: 0.15rem;
      flex-shrink: 0;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .options-header {
      padding: 0.6rem 0 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .options-header > h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0;
      text-transform: none;
      margin-bottom: 0.3rem;
    }

    .options-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding-bottom: 0.55rem;
    }

    .text-btn {
      background: none;
      border: none;
      color: #2563eb;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
    }

    .text-btn:hover { text-decoration: underline; }

    .sep { color: #ccc; font-size: 0.8rem; }

    .dash-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem 1rem;
    }

    .dash-row > label { flex-shrink: 0; }

    .dash-choices {
      display: flex;
      gap: 0.9rem;
      align-items: center;
    }

    .dash-choices label {
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0;
    }

    .dash-choices label input[type="radio"] { margin-top: 0; }

    .dash-choices.muted {
      opacity: 0.35;
      pointer-events: none;
    }

    .cap-choices {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding-left: 1.6rem;
      margin-top: 0.2rem;
    }

    .cap-choices.muted {
      opacity: 0.35;
      pointer-events: none;
    }

    .info {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      border: 1.5px solid #aaa;
      color: #aaa;
      font-size: 0.65rem;
      font-style: normal;
      font-weight: 600;
      cursor: help;
      position: relative;
      vertical-align: middle;
      flex-shrink: 0;
      line-height: 1;
      margin-left: 0.2em;
    }

    .info::after {
      content: attr(data-tip);
      position: absolute;
      left: 0;
      right: auto;
      top: calc(100% + 6px);
      transform: none;
      background: #333;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 400;
      padding: 0.45em 0.7em;
      border-radius: 6px;
      width: max-content;
      max-width: 230px;
      white-space: normal;
      line-height: 1.45;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      text-align: left;
    }

    .info:hover::after { opacity: 1; }

    .text-area-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.6;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #2563eb; }

    textarea::placeholder { color: #bbb; }

    .actions {
      display: flex;
      gap: 0.6rem;
    }

    button {
      padding: 0.55rem 1.25rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #applyBtn {
      background: #2563eb;
      color: #fff;
    }

    #applyBtn:hover { background: #1d4ed8; }

    #copyBtn {
      background: #e5e7eb;
      color: #222;
    }

    #copyBtn:hover { background: #d1d5db; }

    #backBtn, #fwdBtn {
      background: #e5e7eb;
      color: #222;
      padding: 0.55rem 0.75rem;
    }

    #backBtn:hover, #fwdBtn:hover { background: #d1d5db; }

    #backBtn:disabled, #fwdBtn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #applyBtn.no-change {
      background: #fef3c7;
      color: #92400e;
    }

    #clearBtn {
      background: #e5e7eb;
      color: #222;
      margin-left: auto;
    }

    #clearBtn:hover { background: #d1d5db; }

    #copyBtn.copied {
      background: #d1fae5;
      color: #065f46;
    }

    .text-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>

  <script>
    // --- Transformation functions ---

    function smartQuotes(text) {
      // Apostrophes: letter before and/or after
      // Opening double quote: after whitespace, start, or open bracket
      // Closing double quote: before whitespace, end, or punctuation

      // Single closing / apostrophe: after a word character
      text = text.replace(/(\w)'(\w)/g, '$1\u2019$2');          // apostrophe between word chars (it's, don't)
      text = text.replace(/(\w)'([^'"]|$)/g, '$1\u2019$2');     // closing after word char

      // Opening single quote: after whitespace / start / open bracket
      text = text.replace(/(^|[\s([{])'(?=\S)/gm, '$1\u2018');

      // Remaining single quotes → closing
      text = text.replace(/'/g, '\u2019');

      // Opening double quote: before a non-space character, preceded by space/start/bracket
      text = text.replace(/(^|[\s([{])"(?=\S)/gm, '$1\u201C');

      // Closing double quote: after a non-space character
      text = text.replace(/(\S)"/g, '$1\u201D');

      // Any remaining double quotes → closing (catches trailing ones)
      text = text.replace(/"/g, '\u201D');

      return text;
    }

    // Title case: capitalize first letter of each "major" word.
    // Minor words (articles, short prepositions, conjunctions) stay lowercase
    // unless they are the first or last word.
    const MINOR_WORDS = new Set([
      'a', 'an', 'the',
      'and', 'but', 'or', 'nor', 'for', 'so', 'yet',
      'as', 'at', 'by', 'in', 'of', 'on', 'to', 'up',
      'via', 'per'
    ]);

    function toTitleCase(text) {
      // Process each line independently so first/last word rules apply per line
      return text.split('\n').map(line => {
        const words = line.split(' ');
        const lastIdx = words.length - 1;
        return words.map((word, i) => {
          if (!word) return word;
          // A word is a "segment start" if it follows an em dash (same token, split below)
          // or follows an en dash (previous token ends with en dash \u2013)
          const prevEndsWithEnDash = i > 0 && words[i - 1].endsWith('\u2013');
          // Split the token on em dashes so each part can be capitalized independently
          const parts = word.split('\u2014');
          return parts.map((part, pi) => {
            if (!part) return part;
            const isFirst = (i === 0 && pi === 0) || pi > 0 || (prevEndsWithEnDash && pi === 0);
            const isLast  = i === lastIdx && pi === parts.length - 1;
            const lower   = part.toLowerCase();
            if (!isFirst && !isLast && MINOR_WORDS.has(lower)) return lower;
            return part.replace(/^([^a-zA-Z]*)([a-zA-Z])/, (_, pre, ch) => pre + ch.toUpperCase());
          }).join('\u2014');
        }).join(' ');
      }).join('\n');
    }

    function collapseWhitespace(text) {
      // Replace tabs and other horizontal whitespace with a regular space, then collapse multiples
      text = text.replace(/[^\S\n]/g, ' ');   // non-newline whitespace → space
      text = text.replace(/ {2,}/g, ' ');     // collapse multiple spaces
      return text;
    }

    function removeLineBreaks(text) {
      // Strip line break (and any surrounding spaces) immediately after an opening bracket or quote
      text = text.replace(/([\u201C\u2018"'(\[{]) *[\r\n]+ */g, '$1');
      // Strip line break (and any surrounding spaces) immediately before a closing bracket or quote
      text = text.replace(/ *[\r\n]+ *([\u201D\u2019"')\]}])/g, '$1');
      // Strip line break immediately before sentence punctuation
      text = text.replace(/[\r\n]+([?!.,;:])/g, '$1');
      // Strip line breaks (and surrounding spaces) around em dashes
      text = text.replace(/ *[\r\n]+ *(\u2014)/g, '$1');
      text = text.replace(/(\u2014) *[\r\n]+ */g, '$1');
      // Replace remaining line breaks with a single space, then collapse
      text = text.replace(/[\r\n]+/g, ' ');
      text = text.replace(/ {2,}/g, ' ');
      return text.trim();
    }

    function replaceHyphenWithEmDash(text) {
      // Any space + hyphen + any space → em dash (no spaces)
      text = text.replace(/[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]-[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]/g, '\u2014');
      // Any space + en dash + any space → em dash (no spaces)
      text = text.replace(/[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]\u2013[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]/g, '\u2014');
      // Strip any spaces immediately around existing em dashes
      text = text.replace(/ *\u2014 */g, '\u2014');
      return text;
    }

    function replaceHyphenWithEnDash(text) {
      // Any space + hyphen + any space → nbsp + en dash + space
      text = text.replace(/[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]-[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]/g, '\u00A0\u2013 ');
      // Em dash (with or without surrounding spaces) → nbsp + en dash + space
      text = text.replace(/[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]?\u2014[\s\u00A0\u202F\u2009\u2007\u2008\u200A\u205F\u3000]?/g, '\u00A0\u2013 ');
      return text;
    }

    function convertEllipsis(text) {
      return text.replace(/\.\.\./g, '\u2026');
    }

    function straightQuotes(text) {
      text = text.replace(/[\u2018\u2019]/g, "'");
      text = text.replace(/[\u201C\u201D]/g, '"');
      return text;
    }

      ['revolutionization', 'revolutionisation'], ['specialization', 'specialisation'],
      ['stabilization', 'stabilisation'], ['standardization', 'standardisation'],
      ['summarization', 'summarisation'], ['synchronization', 'synchronisation'],
      ['visualization', 'visualisation'],
      // -or / -our
      ['color', 'colour'], ['favor', 'favour'], ['honor', 'honour'], ['humor', 'humour'],
      ['labor', 'labour'], ['neighbor', 'neighbour'], ['behavior', 'behaviour'],
      ['flavor', 'flavour'], ['harbor', 'harbour'], ['rumor', 'rumour'],
      ['savior', 'saviour'], ['valor', 'valour'], ['vigor', 'vigour'],
      ['glamor', 'glamour'], ['candor', 'candour'], ['clamor', 'clamour'],
      ['endeavor', 'endeavour'], ['fervor', 'fervour'], ['odor', 'odour'],
      ['rancor', 'rancour'], ['rigor', 'rigour'], ['splendor', 'splendour'],
      ['tumor', 'tumour'], ['ardor', 'ardour'],
      // -er / -re
      ['center', 'centre'], ['theater', 'theatre'], ['fiber', 'fibre'],
      ['liter', 'litre'], ['meter', 'metre'], ['saber', 'sabre'],
      ['somber', 'sombre'], ['caliber', 'calibre'], ['specter', 'spectre'],
      ['luster', 'lustre'], ['maneuver', 'manoeuvre'], ['meager', 'meagre'],
      // -log / -logue
      ['analog', 'analogue'], ['catalog', 'catalogue'], ['dialog', 'dialogue'],
      ['monolog', 'monologue'], ['prolog', 'prologue'], ['epilog', 'epilogue'],
      // -ense / -ence
      ['defense', 'defence'], ['offense', 'offence'], ['license', 'licence'],
      ['pretense', 'pretence'],
      // -l- / -ll-
      ['canceled', 'cancelled'], ['canceling', 'cancelling'],
      ['traveled', 'travelled'], ['traveling', 'travelling'], ['traveler', 'traveller'],
      ['modeled', 'modelled'], ['modeling', 'modelling'],
      ['labeled', 'labelled'], ['labeling', 'labelling'],
      ['leveled', 'levelled'], ['leveling', 'levelling'],
      ['rivaled', 'rivalled'], ['rivaling', 'rivalling'],
      ['signaled', 'signalled'], ['signaling', 'signalling'],
      ['counselor', 'counsellor'], ['counseling', 'counselling'],
      ['fueled', 'fuelled'], ['fueling', 'fuelling'],
      ['jeweler', 'jeweller'], ['jewelry', 'jewellery'],
      ['marvelous', 'marvellous'],
      // -e / -ae / -oe
      ['anemia', 'anaemia'], ['anesthetic', 'anaesthetic'], ['archeology', 'archaeology'],
      ['pediatric', 'paediatric'], ['pediatrician', 'paediatrician'],
      ['encyclopedia', 'encyclopaedia'], ['gynecology', 'gynaecology'],
      ['hemoglobin', 'haemoglobin'], ['hemorrhage', 'haemorrhage'],
      ['leukemia', 'leukaemia'], ['esophagus', 'oesophagus'],
      ['estrogen', 'oestrogen'], ['fetus', 'foetus'], ['diarrhea', 'diarrhoea'],
      // Miscellaneous common pairs
      ['gray', 'grey'], ['aging', 'ageing'], ['judgment', 'judgement'],
      ['acknowledgment', 'acknowledgement'], ['analog', 'analogue'],
      ['airplane', 'aeroplane'], ['aluminum', 'aluminium'],
      ['artifact', 'artefact'], ['check', 'cheque'], ['curb', 'kerb'],
      ['draft', 'draught'], ['donut', 'doughnut'], ['fulfill', 'fulfil'],
      ['installment', 'instalment'], ['jail', 'gaol'], ['mold', 'mould'],
      ['molding', 'moulding'], ['molt', 'moult'], ['mustache', 'moustache'],
      ['pajamas', 'pyjamas'], ['plow', 'plough'], ['program', 'programme'],
      ['skeptic', 'sceptic'], ['skeptical', 'sceptical'], ['skepticism', 'scepticism'],
      ['tire', 'tyre'], ['cozy', 'cosy'],
    ];

    // Build lookup maps for fast conversion
    const US_TO_UK = new Map();
    const UK_TO_US = new Map();
    SPELLING_PAIRS.forEach(([us, uk]) => {
      if (us !== uk) {
        US_TO_UK.set(us, uk);
        UK_TO_US.set(uk, us);
      }
    });

    function replaceSpellingWord(word, map) {
      const lower = word.toLowerCase();
      const replacement = map.get(lower);
      if (!replacement) return word;
      // Preserve original casing pattern
      if (word === word.toUpperCase()) return replacement.toUpperCase();
      if (word[0] === word[0].toUpperCase() && word.slice(1) === word.slice(1).toLowerCase()) {
        return replacement[0].toUpperCase() + replacement.slice(1);
      }
      return replacement;
    }

    function convertSpelling(text, map) {
      return text.replace(/[a-zA-Z]+/g, word => replaceSpellingWord(word, map));
    }

    // Swap double ↔ single typographic quotes (for UK ↔ US primary/secondary quote style)
    function doubleToSingleQuotes(text) {
      text = text.replace(/\u201C/g, '\u2018');
      text = text.replace(/\u201D/g, '\u2019');
      return text;
    }

    function singleToDoubleQuotes(text) {
      // \u2018 (left single) is always an opening quote, never an apostrophe — safe to convert
      text = text.replace(/\u2018/g, '\u201C');
      // \u2019 is used for both closing quotes and apostrophes.
      // Heuristic: it's a closing quote when NOT preceded by a word character.
      // This correctly handles: 'word' (closing after d→ preceded by d, hmm)
      // Better: it's an apostrophe when surrounded by word chars on both sides (contractions)
      // or follows a word char and precedes a word char (it's, don't)
      // It's a closing quote when preceded by word char but followed by space/punct/end
      text = text.replace(/\u2019(?!\w)/g, '\u201D');
      return text;
    }

    // US style: periods and commas go inside closing quotes
    function punctuationInsideQuotes(text) {
      // Move . and , from after closing quote to before it
      // Handle double quotes
      text = text.replace(/(\u201D)([.,])/g, '$2$1');
      text = text.replace(/(\u2019)([.,])/g, '$2$1');
      // Handle straight quotes too
      text = text.replace(/(")([.,])/g, '$2$1');
      text = text.replace(/(')([.,])/g, '$2$1');
      return text;
    }

    // UK style: periods and commas go outside closing quotes
    function punctuationOutsideQuotes(text) {
      // Move . and , from before closing quote to after it
      // Handle double quotes
      text = text.replace(/([.,])(\u201D)/g, '$2$1');
      text = text.replace(/([.,])(\u2019)/g, '$2$1');
      // Handle straight quotes too
      text = text.replace(/([.,])(")/g, '$2$1');
      text = text.replace(/([.,])(')/g, '$2$1');
      return text;
    }

    function convertToUS(text) {
      return convertSpelling(text, UK_TO_US);
    }

    function convertToUK(text) {
      return convertSpelling(text, US_TO_UK);
    }

    function toAllCaps(text) {
      return text.toUpperCase();
    }

    function toLowercase(text) {
      return text.toLowerCase();
    }

    function toSentenceCase(text) {
      // Lowercase everything, then capitalize the first letter of each sentence.
      // Sentence starts: beginning of string/line, or after . ! ? followed by whitespace.
      return text.toLowerCase()
        .replace(/(^|[.!?]\s+)([a-z])/gm, (_, pre, ch) => pre + ch.toUpperCase());
    }

    // --- UI wiring ---

    const inputText    = document.getElementById('inputText');
    const applyBtn     = document.getElementById('applyBtn');
    const backBtn      = document.getElementById('backBtn');
    const fwdBtn       = document.getElementById('fwdBtn');
    const copyBtn      = document.getElementById('copyBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearAllBtn  = document.getElementById('clearAllBtn');

    let history      = [];
    let historyIndex = -1;

    function updateNavButtons() {
      backBtn.disabled = historyIndex <= 0;
      fwdBtn.disabled  = historyIndex >= history.length - 1;
    }

    const chkWhitespace     = document.getElementById('chkWhitespace');
    const chkLineBreaks     = document.getElementById('chkLineBreaks');
    const chkDash           = document.getElementById('chkDash');
    const rdoEmDash         = document.getElementById('rdoEmDash');
    const rdoEnDash         = document.getElementById('rdoEnDash');
    const dashChoices       = document.getElementById('dashChoices');
    const chkQuotes         = document.getElementById('chkQuotes');
    const rdoTypographic    = document.getElementById('rdoTypographic');
    const rdoStraight       = document.getElementById('rdoStraight');
    const quotesChoices     = document.getElementById('quotesChoices');
    const chkEllipsis           = document.getElementById('chkEllipsis');
    const chkQuoteStyle         = document.getElementById('chkQuoteStyle');
    const rdoDouble             = document.getElementById('rdoDouble');
    const rdoSingle             = document.getElementById('rdoSingle');
    const quoteStyleChoices     = document.getElementById('quoteStyleChoices');
    const chkPunctPlacement     = document.getElementById('chkPunctPlacement');
    const rdoInside             = document.getElementById('rdoInside');
    const rdoOutside            = document.getElementById('rdoOutside');
    const punctPlacementChoices = document.getElementById('punctPlacementChoices');
    const chkEnglish            = document.getElementById('chkEnglish');
    const rdoUS             = document.getElementById('rdoUS');
    const rdoUK             = document.getElementById('rdoUK');
    const englishChoices    = document.getElementById('englishChoices');
    const chkCapitalization = document.getElementById('chkCapitalization');
    const rdoTitleCase      = document.getElementById('rdoTitleCase');
    const rdoSentenceCase   = document.getElementById('rdoSentenceCase');
    const rdoAllCaps        = document.getElementById('rdoAllCaps');
    const rdoLowercase      = document.getElementById('rdoLowercase');
    const capChoices        = document.getElementById('capChoices');

    const wordCountEl = document.getElementById('wordCount');
    const charCountEl = document.getElementById('charCount');

    function updateStats() {
      const text = inputText.value;
      const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      const chars = text.length;
      wordCountEl.textContent = words === 1 ? '1 word' : `${words} words`;
      charCountEl.textContent = chars === 1 ? '1 character' : `${chars} characters`;
    }

    inputText.addEventListener('input', updateStats);

    const allCheckboxes = [chkLineBreaks, chkWhitespace, chkDash, chkEllipsis, chkQuotes, chkQuoteStyle, chkPunctPlacement, chkEnglish, chkCapitalization];

    function setGroupEnabled(checkbox, choicesEl, radios) {
      const on = checkbox.checked;
      choicesEl.classList.toggle('muted', !on);
      radios.forEach(r => r.disabled = !on);
    }

    chkDash.addEventListener('change', () =>
      setGroupEnabled(chkDash, dashChoices, [rdoEmDash, rdoEnDash]));

    chkQuotes.addEventListener('change', () =>
      setGroupEnabled(chkQuotes, quotesChoices, [rdoTypographic, rdoStraight]));

    chkQuoteStyle.addEventListener('change', () =>
      setGroupEnabled(chkQuoteStyle, quoteStyleChoices, [rdoDouble, rdoSingle]));

    chkPunctPlacement.addEventListener('change', () =>
      setGroupEnabled(chkPunctPlacement, punctPlacementChoices, [rdoInside, rdoOutside]));

    chkEnglish.addEventListener('change', () =>
      setGroupEnabled(chkEnglish, englishChoices, [rdoUS, rdoUK]));

    chkCapitalization.addEventListener('change', () =>
      setGroupEnabled(chkCapitalization, capChoices, [rdoTitleCase, rdoSentenceCase, rdoAllCaps, rdoLowercase]));

    function syncAllGroups() {
      setGroupEnabled(chkDash, dashChoices, [rdoEmDash, rdoEnDash]);
      setGroupEnabled(chkQuotes, quotesChoices, [rdoTypographic, rdoStraight]);
      setGroupEnabled(chkQuoteStyle, quoteStyleChoices, [rdoDouble, rdoSingle]);
      setGroupEnabled(chkPunctPlacement, punctPlacementChoices, [rdoInside, rdoOutside]);
      setGroupEnabled(chkEnglish, englishChoices, [rdoUS, rdoUK]);
      setGroupEnabled(chkCapitalization, capChoices, [rdoTitleCase, rdoSentenceCase, rdoAllCaps, rdoLowercase]);
    }

    selectAllBtn.addEventListener('click', () => {
      allCheckboxes.forEach(c => c.checked = true);
      syncAllGroups();
      saveCheckboxes();
    });

    clearAllBtn.addEventListener('click', () => {
      allCheckboxes.forEach(c => c.checked = false);
      syncAllGroups();
      saveCheckboxes();
    });

    applyBtn.addEventListener('click', () => {
      const before = inputText.value;
      let text = before;

      // Order: whitespace → dashes → ellipsis → quote style → quote level → punct placement → vocabulary → capitalization
      if (chkLineBreaks.checked)                                 text = removeLineBreaks(text);
      if (chkWhitespace.checked)                                 text = collapseWhitespace(text);
      if (chkDash.checked && rdoEmDash.checked)                  text = replaceHyphenWithEmDash(text);
      if (chkDash.checked && rdoEnDash.checked)                  text = replaceHyphenWithEnDash(text);
      if (chkEllipsis.checked)                                   text = convertEllipsis(text);
      if (chkQuotes.checked && rdoTypographic.checked)           text = smartQuotes(text);
      if (chkQuotes.checked && rdoStraight.checked)              text = straightQuotes(text);
      if (chkQuoteStyle.checked && rdoDouble.checked)            text = singleToDoubleQuotes(text);
      if (chkQuoteStyle.checked && rdoSingle.checked)            text = doubleToSingleQuotes(text);
      if (chkPunctPlacement.checked && rdoInside.checked)        text = punctuationInsideQuotes(text);
      if (chkPunctPlacement.checked && rdoOutside.checked)       text = punctuationOutsideQuotes(text);
      if (chkEnglish.checked && rdoUS.checked)                   text = convertToUS(text);
      if (chkEnglish.checked && rdoUK.checked)                   text = convertToUK(text);
      if (chkCapitalization.checked && rdoTitleCase.checked)     text = toTitleCase(text);
      if (chkCapitalization.checked && rdoSentenceCase.checked)  text = toSentenceCase(text);
      if (chkCapitalization.checked && rdoAllCaps.checked)       text = toAllCaps(text);
      if (chkCapitalization.checked && rdoLowercase.checked)     text = toLowercase(text);

      if (text === before) {
        applyBtn.textContent = 'No changes';
        applyBtn.classList.add('no-change');
        setTimeout(() => {
          applyBtn.textContent = 'Apply';
          applyBtn.classList.remove('no-change');
        }, 1500);
        return;
      }

      // If the textarea has drifted from the current history entry, record it first
      if (historyIndex === -1 || history[historyIndex] !== before) {
        history = history.slice(0, historyIndex + 1);
        history.push(before);
        historyIndex = history.length - 1;
      }

      // Truncate forward history and push new state
      history = history.slice(0, historyIndex + 1);
      history.push(text);
      historyIndex = history.length - 1;

      inputText.value = text;
      updateNavButtons();
      updateStats();
    });

    backBtn.addEventListener('click', () => {
      if (historyIndex > 0) {
        historyIndex--;
        inputText.value = history[historyIndex];
        updateNavButtons();
        updateStats();
      }
    });

    fwdBtn.addEventListener('click', () => {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        inputText.value = history[historyIndex];
        updateNavButtons();
        updateStats();
      }
    });

    copyBtn.addEventListener('click', async () => {
      if (!inputText.value) return;
      try {
        await navigator.clipboard.writeText(inputText.value);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 1500);
      } catch {
        inputText.select();
        document.execCommand('copy');
      }
    });

    clearBtn.addEventListener('click', () => {
      inputText.value = '';
      history      = [];
      historyIndex = -1;
      updateNavButtons();
      updateStats();
      inputText.focus();
    });

    // --- Checkbox persistence ---
    function saveCheckboxes() {
      const state = {};
      allCheckboxes.forEach(c => { state[c.id] = c.checked; });
      localStorage.setItem('checkboxes', JSON.stringify(state));
    }

    function restoreCheckboxes() {
      const saved = localStorage.getItem('checkboxes');
      if (!saved) return;
      const state = JSON.parse(saved);
      allCheckboxes.forEach(c => { if (c.id in state) c.checked = state[c.id]; });
    }

    allCheckboxes.forEach(c => c.addEventListener('change', saveCheckboxes));

    restoreCheckboxes();
    // Initialise group enabled/muted state to match default checked state
    syncAllGroups();

    // --- Layout toggle ---
    const container        = document.querySelector('.container');
    const layoutToggleBtn  = document.getElementById('layoutToggleBtn');

    function applyLayout(stacked) {
      container.classList.toggle('layout-stacked', stacked);
      layoutToggleBtn.textContent = stacked ? '⇔ Side-by-side layout' : '⇅ Stacked layout';
    }

    const savedLayout = localStorage.getItem('layout');
    applyLayout(savedLayout === 'stacked');

    layoutToggleBtn.addEventListener('click', () => {
      const stacked = !container.classList.contains('layout-stacked');
      applyLayout(stacked);
      localStorage.setItem('layout', stacked ? 'stacked' : 'side-by-side');
    });
  </script>
</body>
</html>
