<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      letter-spacing: -0.02em;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .options {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 0.75rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem 0;
    }

    .option-group + .option-group {
      border-top: 1px solid #f0f0f0;
    }

    .option-group h2 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 0.1rem;
    }

    label {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1.4;
      user-select: none;
    }

    label input[type="checkbox"],
    label input[type="radio"] {
      width: 1rem;
      height: 1rem;
      margin-top: 0.15rem;
      flex-shrink: 0;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .options-header {
      padding: 0.6rem 0 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .options-header > h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0;
      text-transform: none;
      margin-bottom: 0.3rem;
    }

    .options-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding-bottom: 0.55rem;
    }

    .text-btn {
      background: none;
      border: none;
      color: #2563eb;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
    }

    .text-btn:hover { text-decoration: underline; }

    .sep { color: #ccc; font-size: 0.8rem; }

    .dash-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem 1rem;
    }

    .dash-row > label { flex-shrink: 0; }

    .dash-choices {
      display: flex;
      gap: 0.9rem;
      align-items: center;
    }

    .dash-choices label {
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0;
    }

    .dash-choices label input[type="radio"] { margin-top: 0; }

    .dash-choices.muted {
      opacity: 0.35;
      pointer-events: none;
    }

    .cap-choices {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding-left: 1.6rem;
      margin-top: 0.2rem;
    }

    .cap-choices.muted {
      opacity: 0.35;
      pointer-events: none;
    }

    .info {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.95em;
      height: 0.95em;
      border-radius: 50%;
      border: 1.5px solid #aaa;
      color: #aaa;
      font-size: 0.68rem;
      font-style: normal;
      font-weight: 600;
      cursor: help;
      position: relative;
      vertical-align: middle;
      flex-shrink: 0;
      line-height: 1;
      margin-left: 0.2em;
    }

    .info::after {
      content: attr(data-tip);
      position: absolute;
      right: 0;
      left: auto;
      top: calc(100% + 6px);
      transform: none;
      background: #333;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 400;
      padding: 0.45em 0.7em;
      border-radius: 6px;
      width: max-content;
      max-width: 230px;
      white-space: normal;
      line-height: 1.45;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      text-align: left;
    }

    .info:hover::after { opacity: 1; }

    .text-area-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.6;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #2563eb; }

    textarea::placeholder { color: #bbb; }

    .actions {
      display: flex;
      gap: 0.6rem;
    }

    button {
      padding: 0.55rem 1.25rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #applyBtn {
      background: #2563eb;
      color: #fff;
    }

    #applyBtn:hover { background: #1d4ed8; }

    #copyBtn {
      background: #e5e7eb;
      color: #222;
    }

    #copyBtn:hover { background: #d1d5db; }

    #resetBtn {
      background: #e5e7eb;
      color: #222;
    }

    #resetBtn:hover { background: #d1d5db; }

    #resetBtn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #clearBtn {
      background: #e5e7eb;
      color: #222;
      margin-left: auto;
    }

    #clearBtn:hover { background: #d1d5db; }

    #copyBtn.copied {
      background: #d1fae5;
      color: #065f46;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Text Tools</h1>

    <div class="options">
      <div class="options-header">
        <h2>Transformations</h2>
        <div class="options-actions">
          <button class="text-btn" id="selectAllBtn">Select all</button>
          <span class="sep">&#183;</span>
          <button class="text-btn" id="clearAllBtn">Clear all</button>
        </div>
      </div>
      <div class="option-group">
        <h2>Whitespace</h2>
        <label>
          <input type="checkbox" id="chkLineBreaks">
          Remove line breaks
        </label>
        <label>
          <input type="checkbox" id="chkWhitespace">
          Collapse extra whitespace
          <i class="info" data-tip="Converts tabs and other non-standard horizontal whitespace to spaces, then collapses multiple consecutive spaces into one.">i</i>
        </label>
      </div>
      <div class="option-group">
        <h2>Typography</h2>
        <div class="dash-row">
          <label>
            <input type="checkbox" id="chkDash">
            Dashes
          </label>
          <span class="dash-choices muted" id="dashChoices">
            <label>
              <input type="radio" name="dashStyle" id="rdoEmDash" value="em" checked>
              Em dash
            </label>
            <label>
              <input type="radio" name="dashStyle" id="rdoEnDash" value="en">
              En dash
              <i class="info" data-tip="Inserts a nonbreaking space before the dash to prevent line breaks between the preceding word and the dash.">i</i>
            </label>
          </span>
        </div>
        <div class="dash-row">
          <label>
            <input type="checkbox" id="chkQuotes">
            Quotation marks and apostrophes
          </label>
          <span class="dash-choices muted" id="quotesChoices">
            <label>
              <input type="radio" name="quotesStyle" id="rdoTypographic" value="typographic" checked>
              Typographic
            </label>
            <label>
              <input type="radio" name="quotesStyle" id="rdoStraight" value="straight">
              Straight
            </label>
          </span>
        </div>
      </div>
      <div class="option-group">
        <h2>Capitalization</h2>
        <label>
          <input type="checkbox" id="chkCapitalization">
          Transform capitalization
        </label>
        <div class="cap-choices muted" id="capChoices">
          <label>
            <input type="radio" name="capStyle" id="rdoTitleCase" value="title" checked>
            Title case
          </label>
          <label>
            <input type="radio" name="capStyle" id="rdoSentenceCase" value="sentence">
            Sentence case
          </label>
          <label>
            <input type="radio" name="capStyle" id="rdoAllCaps" value="allcaps">
            All caps
          </label>
          <label>
            <input type="radio" name="capStyle" id="rdoLowercase" value="lowercase">
            Lowercase
          </label>
        </div>
      </div>
    </div>

    <div class="text-area-wrapper">
      <textarea id="inputText" placeholder="Paste or type your text here…"></textarea>
    </div>

    <div class="actions">
      <button id="applyBtn">Apply</button>
      <button id="resetBtn" disabled>Reset</button>
      <button id="copyBtn">Copy</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    // --- Transformation functions ---

    function smartQuotes(text) {
      // Apostrophes: letter before and/or after
      // Opening double quote: after whitespace, start, or open bracket
      // Closing double quote: before whitespace, end, or punctuation

      // Single closing / apostrophe: after a word character
      text = text.replace(/(\w)'(\w)/g, '$1\u2019$2');          // apostrophe between word chars (it's, don't)
      text = text.replace(/(\w)'([^'"]|$)/g, '$1\u2019$2');     // closing after word char

      // Opening single quote: after whitespace / start / open bracket
      text = text.replace(/(^|[\s([{])'(?=\S)/gm, '$1\u2018');

      // Remaining single quotes → closing
      text = text.replace(/'/g, '\u2019');

      // Opening double quote: before a non-space character, preceded by space/start/bracket
      text = text.replace(/(^|[\s([{])"(?=\S)/gm, '$1\u201C');

      // Closing double quote: after a non-space character
      text = text.replace(/(\S)"/g, '$1\u201D');

      // Any remaining double quotes → closing (catches trailing ones)
      text = text.replace(/"/g, '\u201D');

      return text;
    }

    // Title case: capitalize first letter of each "major" word.
    // Minor words (articles, short prepositions, conjunctions) stay lowercase
    // unless they are the first or last word.
    const MINOR_WORDS = new Set([
      'a', 'an', 'the',
      'and', 'but', 'or', 'nor', 'for', 'so', 'yet',
      'as', 'at', 'by', 'in', 'of', 'on', 'to', 'up',
      'via', 'per'
    ]);

    function toTitleCase(text) {
      // Process each line independently so first/last word rules apply per line
      return text.split('\n').map(line => {
        const words = line.split(' ');
        const lastIdx = words.length - 1;
        return words.map((word, i) => {
          if (!word) return word;
          // A word is a "segment start" if it follows an em dash (same token, split below)
          // or follows an en dash (previous token ends with en dash \u2013)
          const prevEndsWithEnDash = i > 0 && words[i - 1].endsWith('\u2013');
          // Split the token on em dashes so each part can be capitalized independently
          const parts = word.split('\u2014');
          return parts.map((part, pi) => {
            if (!part) return part;
            const isFirst = (i === 0 && pi === 0) || pi > 0 || (prevEndsWithEnDash && pi === 0);
            const isLast  = i === lastIdx && pi === parts.length - 1;
            const lower   = part.toLowerCase();
            if (!isFirst && !isLast && MINOR_WORDS.has(lower)) return lower;
            return part.replace(/^([^a-zA-Z]*)([a-zA-Z])/, (_, pre, ch) => pre + ch.toUpperCase());
          }).join('\u2014');
        }).join(' ');
      }).join('\n');
    }

    function collapseWhitespace(text) {
      // Replace tabs and other horizontal whitespace with a regular space, then collapse multiples
      text = text.replace(/[^\S\n]/g, ' ');   // non-newline whitespace → space
      text = text.replace(/ {2,}/g, ' ');     // collapse multiple spaces
      return text;
    }

    function removeLineBreaks(text) {
      // Replace newlines (and carriage returns) with a single space, then collapse
      text = text.replace(/[\r\n]+/g, ' ');
      text = text.replace(/ {2,}/g, ' ');
      return text.trim();
    }

    function replaceHyphenWithEmDash(text) {
      return text.replace(/ - /g, '\u2014');
    }

    function replaceHyphenWithEnDash(text) {
      return text.replace(/ - /g, '\u00A0\u2013 ');
    }

    function straightQuotes(text) {
      text = text.replace(/[\u2018\u2019]/g, "'");
      text = text.replace(/[\u201C\u201D]/g, '"');
      return text;
    }

    function toAllCaps(text) {
      return text.toUpperCase();
    }

    function toLowercase(text) {
      return text.toLowerCase();
    }

    function toSentenceCase(text) {
      // Lowercase everything, then capitalize the first letter of each sentence.
      // Sentence starts: beginning of string/line, or after . ! ? followed by whitespace.
      return text.toLowerCase()
        .replace(/(^|[.!?]\s+)([a-z])/gm, (_, pre, ch) => pre + ch.toUpperCase());
    }

    // --- UI wiring ---

    const inputText    = document.getElementById('inputText');
    const applyBtn     = document.getElementById('applyBtn');
    const resetBtn     = document.getElementById('resetBtn');
    const copyBtn      = document.getElementById('copyBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearAllBtn  = document.getElementById('clearAllBtn');

    let originalText = null;

    const chkWhitespace     = document.getElementById('chkWhitespace');
    const chkLineBreaks     = document.getElementById('chkLineBreaks');
    const chkDash           = document.getElementById('chkDash');
    const rdoEmDash         = document.getElementById('rdoEmDash');
    const rdoEnDash         = document.getElementById('rdoEnDash');
    const dashChoices       = document.getElementById('dashChoices');
    const chkQuotes         = document.getElementById('chkQuotes');
    const rdoTypographic    = document.getElementById('rdoTypographic');
    const rdoStraight       = document.getElementById('rdoStraight');
    const quotesChoices     = document.getElementById('quotesChoices');
    const chkCapitalization = document.getElementById('chkCapitalization');
    const rdoTitleCase      = document.getElementById('rdoTitleCase');
    const rdoSentenceCase   = document.getElementById('rdoSentenceCase');
    const rdoAllCaps        = document.getElementById('rdoAllCaps');
    const rdoLowercase      = document.getElementById('rdoLowercase');
    const capChoices        = document.getElementById('capChoices');

    const allCheckboxes = [chkLineBreaks, chkWhitespace, chkDash, chkQuotes, chkCapitalization];

    function setGroupEnabled(checkbox, choicesEl, radios) {
      const on = checkbox.checked;
      choicesEl.classList.toggle('muted', !on);
      radios.forEach(r => r.disabled = !on);
    }

    chkDash.addEventListener('change', () =>
      setGroupEnabled(chkDash, dashChoices, [rdoEmDash, rdoEnDash]));

    chkQuotes.addEventListener('change', () =>
      setGroupEnabled(chkQuotes, quotesChoices, [rdoTypographic, rdoStraight]));

    chkCapitalization.addEventListener('change', () =>
      setGroupEnabled(chkCapitalization, capChoices, [rdoTitleCase, rdoSentenceCase, rdoAllCaps, rdoLowercase]));

    selectAllBtn.addEventListener('click', () => {
      allCheckboxes.forEach(c => c.checked = true);
      setGroupEnabled(chkDash, dashChoices, [rdoEmDash, rdoEnDash]);
      setGroupEnabled(chkQuotes, quotesChoices, [rdoTypographic, rdoStraight]);
      setGroupEnabled(chkCapitalization, capChoices, [rdoTitleCase, rdoSentenceCase, rdoAllCaps, rdoLowercase]);
    });

    clearAllBtn.addEventListener('click', () => {
      allCheckboxes.forEach(c => c.checked = false);
      setGroupEnabled(chkDash, dashChoices, [rdoEmDash, rdoEnDash]);
      setGroupEnabled(chkQuotes, quotesChoices, [rdoTypographic, rdoStraight]);
      setGroupEnabled(chkCapitalization, capChoices, [rdoTitleCase, rdoSentenceCase, rdoAllCaps, rdoLowercase]);
    });

    applyBtn.addEventListener('click', () => {
      originalText = inputText.value;
      resetBtn.disabled = false;

      let text = originalText;

      // Order: whitespace → dashes → capitalization → quotes
      if (chkLineBreaks.checked)                          text = removeLineBreaks(text);
      if (chkWhitespace.checked)                          text = collapseWhitespace(text);
      if (chkDash.checked && rdoEmDash.checked)           text = replaceHyphenWithEmDash(text);
      if (chkDash.checked && rdoEnDash.checked)           text = replaceHyphenWithEnDash(text);
      if (chkCapitalization.checked && rdoTitleCase.checked)    text = toTitleCase(text);
      if (chkCapitalization.checked && rdoSentenceCase.checked) text = toSentenceCase(text);
      if (chkCapitalization.checked && rdoAllCaps.checked)      text = toAllCaps(text);
      if (chkCapitalization.checked && rdoLowercase.checked)    text = toLowercase(text);
      if (chkQuotes.checked && rdoTypographic.checked)    text = smartQuotes(text);
      if (chkQuotes.checked && rdoStraight.checked)       text = straightQuotes(text);

      inputText.value = text;
    });

    resetBtn.addEventListener('click', () => {
      if (originalText !== null) {
        inputText.value = originalText;
        originalText = null;
        resetBtn.disabled = true;
      }
    });

    copyBtn.addEventListener('click', async () => {
      if (!inputText.value) return;
      try {
        await navigator.clipboard.writeText(inputText.value);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 1500);
      } catch {
        inputText.select();
        document.execCommand('copy');
      }
    });

    clearBtn.addEventListener('click', () => {
      inputText.value = '';
      originalText = null;
      resetBtn.disabled = true;
      inputText.focus();
    });
  </script>
</body>
</html>
